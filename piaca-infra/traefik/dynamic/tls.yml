# Configuração dinâmica do Traefik
# Certificado TLS autoassinado para desenvolvimento local.
# Em produção, substitua por certificados Let's Encrypt ou outro provedor.

tls:
  certificates:
    - certFile: /certs/local.crt
      keyFile: /certs/local.key
  stores:
    default:
      defaultCertificate:
        certFile: /certs/local.crt
        keyFile: /certs/local.key

version: "3.9"

services:
  traefik:
    image: traefik:v3.1
    container_name: piaca-traefik
    restart: unless-stopped
    command:
      - --log.level=INFO
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=piaca-net
      - --entrypoints.web.address=:80
    ports:
      - 80:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - piaca-net

  postgres:
    image: postgres:16
    container_name: piaca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: piaca_db
      POSTGRES_USER: piaca_user
      POSTGRES_PASSWORD: piaca_pass
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - piaca-net

  flyway:
    image: flyway/flyway:10
    container_name: piaca-flyway
    command: -url=jdbc:postgresql://postgres:5432/piaca_db -user=piaca_user -password=piaca_pass -locations=filesystem:/flyway/sql migrate
    volumes:
      - ./piaca-backend/migrations:/flyway/sql
    depends_on:
      - postgres
    networks:
      - piaca-net

  example-module:
    build:
      context: ./piaca-backend/example-module
      dockerfile: Dockerfile
    container_name: example-module
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: piaca_db
      DB_USER: piaca_user
      DB_PASSWORD: piaca_pass
    networks:
      - piaca-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.example.rule=PathPrefix(`/example`)
      - traefik.http.routers.example.entrypoints=web
      - traefik.http.services.example.loadbalancer.server.port=3005

